<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ILLIA V3 | Web Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.4.3/bcrypt.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }
        
        body {
            background-color: #0b0f19;
            background-image: radial-gradient(circle at 50% 0%, #1a2342 0%, #0b0f19 70%);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            background: rgba(20, 25, 40, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 100, 255, 0.3);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 0 40px rgba(0, 100, 255, 0.15);
            text-align: center;
            position: relative;
        }

        h1 {
            font-size: 24px;
            font-weight: 900;
            margin-bottom: 5px;
            background: linear-gradient(90deg, #0064ff, #7828b4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle { color: #8892b0; font-size: 14px; margin-bottom: 30px; }

        .lang-switch {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        .lang-btn {
            background: none; border: none; color: #5c678a;
            font-weight: 700; cursor: pointer; transition: 0.3s;
            font-size: 12px;
        }

        .lang-btn.active, .lang-btn:hover { color: #0064ff; text-shadow: 0 0 10px #0064ff; }

        .btn {
            width: 100%; padding: 15px; margin: 10px 0;
            border: none; border-radius: 10px;
            font-weight: 700; font-size: 14px;
            cursor: pointer; transition: 0.3s;
            color: white; text-transform: uppercase;
        }

        .btn-user { background: #0064ff; box-shadow: 0 5px 15px rgba(0, 100, 255, 0.3); }
        .btn-user:hover { background: #004dcc; box-shadow: 0 5px 25px rgba(0, 100, 255, 0.5); transform: translateY(-2px); }

        .btn-admin { background: #7828b4; box-shadow: 0 5px 15px rgba(120, 40, 180, 0.3); margin-top: 5px; }
        .btn-admin:hover { background: #5a1e87; box-shadow: 0 5px 25px rgba(120, 40, 180, 0.5); transform: translateY(-2px); }

        .input-group { margin-top: 20px; text-align: left; }
        
        input[type="password"] {
            width: 100%; padding: 15px;
            background: rgba(10, 15, 25, 0.8);
            border: 1px solid #2a3454; border-radius: 10px;
            color: #fff; margin-bottom: 10px; font-size: 14px;
            outline: none; transition: 0.3s;
        }

        input[type="password"]:focus { border-color: #7828b4; box-shadow: 0 0 15px rgba(120, 40, 180, 0.3); }

        textarea {
            width: 100%; height: 120px;
            background: #060913; border: 1px solid #1a2342;
            border-radius: 10px; color: #00ff88;
            padding: 15px; margin-top: 20px;
            font-family: monospace; font-size: 13px;
            resize: none; outline: none;
        }

        .status { margin-top: 10px; font-size: 13px; font-weight: 700; min-height: 20px; }
        .success { color: #00ff88; }
        .error { color: #ff3366; }
    </style>
</head>
<body>

    <div class="container">
        <div class="lang-switch">
            <button class="lang-btn" onclick="setLang('UKR')" id="btn-UKR">UKR</button>
            <button class="lang-btn active" onclick="setLang('RUS')" id="btn-RUS">RUS</button>
            <button class="lang-btn" onclick="setLang('ENG')" id="btn-ENG">ENG</button>
        </div>

        <h1 id="t-title">ILLIA V3 СИСТЕМА</h1>
        <p class="subtitle" id="t-sub">Центр генерации ключей</p>

        <button class="btn btn-user" id="t-gen-user" onclick="generateUserKey()">Сгенерировать ключ (24 часа)</button>

        <div class="input-group">
            <input type="password" id="adminPwd" placeholder="Мастер-пароль...">
            <button class="btn btn-admin" id="t-gen-admin" onclick="generateAdminKey()">Создать АДМИН ключ</button>
        </div>

        <div class="status" id="statusMsg"></div>

        <textarea id="resultOutput" readonly placeholder="{ ... результат ... }"></textarea>
    </div>

    <script>
        // Твой оригинальный хэш
        const MASTER_HASH = "$2b$10$cilpR5lO.eDrP8QQgqHlquz5Tr06oNMUI4kFVRtQG/KnSu8p6cF4O";

        // Система переводов
        const langs = {
            RUS: {
                title: "ILLIA V3 СИСТЕМА", sub: "Центр генерации ключей",
                genUser: "Сгенерировать ключ (24 часа)", pwd: "Мастер-пароль...",
                genAdmin: "Создать АДМИН ключ", errPwd: "❌ Неверный пароль!",
                wait: "⏳ Проверка пароля...", success: "✅ Скопируй это в keys.json:"
            },
            UKR: {
                title: "ILLIA V3 СИСТЕМА", sub: "Центр генерації ключів",
                genUser: "Згенерувати ключ (24 години)", pwd: "Майстер-пароль...",
                genAdmin: "Створити АДМІН ключ", errPwd: "❌ Невірний пароль!",
                wait: "⏳ Перевірка пароля...", success: "✅ Скопіюй це у keys.json:"
            },
            ENG: {
                title: "ILLIA V3 SYSTEM", sub: "Key Generation Center",
                genUser: "Generate User Key (24 hours)", pwd: "Master Password...",
                genAdmin: "Create ADMIN Key", errPwd: "❌ Wrong Password!",
                wait: "⏳ Validating password...", success: "✅ Copy this to keys.json:"
            }
        };

        let currentLang = 'RUS';

        function setLang(lang) {
            currentLang = lang;
            document.getElementById('t-title').innerText = langs[lang].title;
            document.getElementById('t-sub').innerText = langs[lang].sub;
            document.getElementById('t-gen-user').innerText = langs[lang].genUser;
            document.getElementById('adminPwd').placeholder = langs[lang].pwd;
            document.getElementById('t-gen-admin').innerText = langs[lang].genAdmin;
            
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + lang).classList.add('active');
            
            document.getElementById('statusMsg').innerText = "";
        }

        // Генератор случайной строки
        function makeStr(length) {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let result = '';
            for (let i = 0; i < length; i++) result += chars.charAt(Math.floor(Math.random() * chars.length));
            return result;
        }

        // Вывод результата
        function showResult(jsonObj, msg, isError = false) {
            const status = document.getElementById('statusMsg');
            const output = document.getElementById('resultOutput');
            
            status.innerText = msg;
            status.className = "status " + (isError ? "error" : "success");
            
            if (jsonObj) {
                const text = JSON.stringify(jsonObj, null, 4);
                output.value = text;
                // Автоматически копируем в буфер обмена
                navigator.clipboard.writeText(text);
                status.innerText += " (Скопировано в буфер!)";
            } else {
                output.value = "";
            }
        }

        function generateUserKey() {
            const key = "USER_" + makeStr(15);
            const expiry = Math.floor(Date.now() / 1000) + 86400; // + 24 часа
            const data = {};
            data[key] = { type: "valid", expiry: expiry };
            showResult(data, langs[currentLang].success);
        }

        function generateAdminKey() {
            const pwd = document.getElementById('adminPwd').value;
            if (!pwd) return;

            const status = document.getElementById('statusMsg');
            status.innerText = langs[currentLang].wait;
            status.className = "status";

            // Небольшая задержка, чтобы UI успел обновиться перед тяжелой проверкой
            setTimeout(() => {
                const bcrypt = dcodeIO.bcrypt;
                const isMatch = bcrypt.compareSync(pwd, MASTER_HASH);

                if (isMatch) {
                    const key = "ADMIN_" + makeStr(15);
                    const data = {};
                    data[key] = { type: "admin" };
                    showResult(data, langs[currentLang].success);
                    document.getElementById('adminPwd').value = ""; // Очищаем пароль
                } else {
                    showResult(null, langs[currentLang].errPwd, true);
                }
            }, 100);
        }

        // Устанавливаем язык по умолчанию при загрузке
        setLang('RUS');
    </script>
</body>
</html>
